# Larger real-data run: TinyStories (simple children's stories, BPE/gpt2).
#   rootllm-prepare-data --dataset tinystories --tokenizer tiktoken --output-dir data/tinystories
#   rootllm-train --config configs/tinystories.yaml
#
# ~20M-param model, matched to the ~5.5M-token validation split. TinyStories'
# simple language means small models produce coherent stories quickly.
#
# To scale to ~150M on the FULL TinyStories train set (the streaming loader keeps
# it off-RAM), it's a one-line change:
#   --set model.dim=768 model.n_layers=16 model.gradient_checkpointing=true \
#         data.train_path=<full-train.bin>
model:
  vocab_size: 50257
  dim: 512
  n_layers: 8
  n_heads: 8
  n_kv_heads: 2
  max_seq_len: 1024
  dropout: 0.05
  use_qk_norm: true
  rope_theta: 10000.0
  tie_embeddings: true
  gradient_checkpointing: false   # not needed at this size; flip on to scale up

train:
  out_dir: out/tinystories
  seq_len: 256              # TinyStories are short; seq 256 fits the 32 GB cap with room
  batch_size: 32
  grad_accum_steps: 1
  eval_interval: 250
  eval_iters: 50
  log_interval: 25
  ckpt_interval: 1000
  sample_tokens: 80
  seed: 1337
  device: auto                    # -> mps
  dtype: auto                     # -> bf16
  memory_cap_gb: 32
  optimizer:
    lr: 6.0e-4
    weight_decay: 0.1
    grad_clip: 1.0
  schedule:
    warmup_steps: 100
    max_steps: 3000
    min_lr_ratio: 0.1

data:
  train_path: data/tinystories/train.bin
  val_path: data/tinystories/val.bin
  token_dtype: uint16
