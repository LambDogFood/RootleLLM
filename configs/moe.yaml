# Sparse Mixture-of-Experts variant: 8 experts, top-2 routing.
# Same active-parameter budget per token as the dense model, more total capacity.
model:
  vocab_size: 32000
  dim: 512
  n_layers: 6
  n_heads: 8
  n_kv_heads: 2
  max_seq_len: 1024
  n_experts: 8
  n_experts_per_token: 2
  moe_aux_loss_coef: 0.01
  use_qk_norm: true
  rope_theta: 500000.0
  tie_embeddings: true

train:
  out_dir: out/moe
  seq_len: 256
  batch_size: 16
  grad_accum_steps: 4
  eval_interval: 250
  eval_iters: 50
  log_interval: 10
  ckpt_interval: 500
  seed: 1337
  device: auto
  dtype: auto
  optimizer:
    lr: 3.0e-4
    weight_decay: 0.1
    grad_clip: 1.0
  schedule:
    warmup_steps: 200
    max_steps: 5000
    min_lr_ratio: 0.1

data:
  train_path: data/train.bin
  val_path: data/val.bin
  token_dtype: uint16
