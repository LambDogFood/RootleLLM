# (Re)start the inference server on the self-hosted runner (your PC), so you can
# query the model from your laptop. Trigger from the GitHub UI or
# `gh workflow run serve.yml -f ckpt=out/rtx5070/best.pt`.
name: serve
run-name: "serve ${{ inputs.ckpt }}"

on:
  workflow_dispatch:
    inputs:
      ckpt:
        description: "Checkpoint to serve"
        default: "out/rtx5070/ckpt.pt"
        type: string
      tokenizer:
        description: "Tokenizer json (match the dataset you trained on)"
        default: "data/tinystories/tokenizer.json"
        type: string

jobs:
  serve:
    runs-on: self-hosted
    defaults:
      run:
        # Bypass the default 'Restricted' execution policy on self-hosted Windows runners.
        shell: 'powershell -ExecutionPolicy Bypass -Command "& ''{0}''; exit $LASTEXITCODE"'
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - name: (Re)start inference server on :8000
        env:
          ROOTLLM_CKPT: ${{ inputs.ckpt }}
          ROOTLLM_TOKENIZER: ${{ inputs.tokenizer }}
        run: |
          docker compose up -d --force-recreate serve
          Start-Sleep -Seconds 6
          docker compose ps
          Write-Output "--- recent serve logs (a startup crash shows here) ---"
          docker compose logs --no-color --tail 60 serve
          $cid = docker compose ps -q serve
          $running = if ($cid) { docker inspect -f '{{.State.Running}}' $cid } else { "false" }
          if ($running -ne "true") {
            Write-Output "ERROR: serve container is not running (see logs above)"
            exit 1
          }
          Write-Output "serve is up on :8000"
